<script>
(() => {
  const flame = document.querySelector('.home-flame');
  const core = flame ? flame.querySelector('.home-flame-core') : null;
  if (!flame || !core) return;
  if (!window.matchMedia('(pointer: fine)').matches) return;

  const maxShift = 1.4;

  flame.addEventListener('mousemove', (event) => {
    const rect = flame.getBoundingClientRect();
    const x = (event.clientX - rect.left) / rect.width - 0.5;
    const y = (event.clientY - rect.top) / rect.height - 0.5;
    const shiftX = Math.max(-maxShift, Math.min(maxShift, x * 2.4));
    const shiftY = Math.max(-maxShift, Math.min(maxShift, y * 2.0));
    core.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
  });

  flame.addEventListener('mouseleave', () => {
    core.style.transform = 'translate(0px, 0px)';
  });
})();

// Rotating tagline
(() => {
  const taglines = [
    'GenAI builder',
    'MCP publisher',
    'F1 fanatic',
    'FOSS enthusiast & speaker',
    'IEEE volunteer'
  ];
  const taglineText = document.querySelector('.tagline-text');
  if (!taglineText) return;
  
  let currentIndex = 0;
  
  const rotate = () => {
    currentIndex = (currentIndex + 1) % taglines.length;
    taglineText.textContent = taglines[currentIndex];
  };
  
  setInterval(rotate, 2500);
})();
</script>

<script>
(() => {
  // Live time display
  const timeEl = document.getElementById('live-time');
  if (timeEl) {
    const updateTime = () => {
      const now = new Date();
      // Convert to IST (UTC+5:30)
      const istTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const hours = String(istTime.getHours()).padStart(2, '0');
      const mins = String(istTime.getMinutes()).padStart(2, '0');
      const secs = String(istTime.getSeconds()).padStart(2, '0');
      timeEl.textContent = `${hours}:${mins}:${secs} IST`;
    };
    updateTime();
    setInterval(updateTime, 1000);
  }
  
  // Live weather fetch
  const weatherEl = document.getElementById('live-weather');
  if (weatherEl) {
    fetch('https://wttr.in/Coimbatore?format=%C+%t')
      .then(r => r.text())
      .then(text => {
        weatherEl.textContent = text.trim();
      })
      .catch(() => {
        weatherEl.textContent = 'Weather unavailable';
      });
  }
})();
</script>
