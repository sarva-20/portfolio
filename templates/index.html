{% extends "base.html" %}

{% block title %}Sarvatarshan Sankar{% endblock title %}

{% block content %}
<div class="home-intro">
  <div class="home-flame" aria-hidden="true">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="flame-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="M18 2C18 2 12 6 10 14C8 20 8 26 14 32C16 34 20 34 22 32C28 26 28 20 26 14C24 6 18 2 18 2Z" fill="#e85c2c"/>
      <ellipse class="home-flame-inner" cx="18" cy="24" rx="2.5" ry="4" fill="#ffd29a" filter="url(#flame-glow)"/>
    </svg>
  </div>

  <h1>hey! I'm Sarvatarshan,<br>an engineer and builder.</h1>
  
  <div class="rotating-tagline">
    <span class="tagline-prefix">› </span><span class="tagline-text">GenAI builder</span>
  </div>
  
  <p>I build with GenAI, agentic systems, and ML. Currently studying CSBS at KPRIET Coimbatore.</p>
</div>

<script>
(() => {
  const flame = document.querySelector('.home-flame');
  const core = flame ? flame.querySelector('.home-flame-core') : null;
  if (!flame || !core) return;
  if (!window.matchMedia('(pointer: fine)').matches) return;

  const maxShift = 1.4;

  flame.addEventListener('mousemove', (event) => {
    const rect = flame.getBoundingClientRect();
    const x = (event.clientX - rect.left) / rect.width - 0.5;
    const y = (event.clientY - rect.top) / rect.height - 0.5;
    const shiftX = Math.max(-maxShift, Math.min(maxShift, x * 2.4));
    const shiftY = Math.max(-maxShift, Math.min(maxShift, y * 2.0));
    core.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
  });

  flame.addEventListener('mouseleave', () => {
    core.style.transform = 'translate(0px, 0px)';
  });
})();

// Rotating tagline
(() => {
  const taglines = [
    'GenAI builder',
    'MCP publisher',
    'F1 fanatic',
    'FOSS enthusiast & speaker',
    'IEEE volunteer'
  ];
  const taglineText = document.querySelector('.tagline-text');
  if (!taglineText) return;
  
  let currentIndex = 0;
  
  const rotate = () => {
    currentIndex = (currentIndex + 1) % taglines.length;
    taglineText.textContent = taglines[currentIndex];
  };
  
  setInterval(rotate, 2500);
})();
</script>
{% endblock content %}
