<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{{ config.description }}" />
  <link rel="stylesheet" href="/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><defs><filter id='flame-glow'><feGaussianBlur stdDeviation='1.5' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><path fill='%23e85c2c' d='M18 2C18 2 12 6 10 14C8 20 8 26 14 32C16 34 20 34 22 32C28 26 28 20 26 14C24 6 18 2 18 2Z'/><ellipse cx='18' cy='24' rx='2.5' ry='4' fill='%23ffd29a' filter='url(%23flame-glow)'/></svg>" />
</head>
<body>

<aside class="sidebar">
  <nav>
    <a href="/" {% if current_path == "/" %}class="active"{% endif %}>home</a>
    <a href="/posts" {% if current_path is starting_with("/posts") %}class="active"{% endif %}>posts</a>
    <a href="/projects" {% if current_path is starting_with("/projects") %}class="active"{% endif %}>projects</a>
    <a href="/about" {% if current_path is starting_with("/about") %}class="active"{% endif %}>about</a>
    <a href="/resume" {% if current_path is starting_with("/resume") %}class="active"{% endif %}>resume</a>
  </nav>

  <hr class="sidebar-divider" />

  <div class="sidebar-social">
    <a href="{{ config.extra.github }}" target="_blank" rel="noopener" title="GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 19c-5 1.5-5-2.5-7-3"/>
        <path d="M16 22v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77 5.44 5.44 0 0 0 3.5 8.5c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
    </a>
    <a href="{{ config.extra.linkedin }}" target="_blank" rel="noopener" title="LinkedIn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="4"/>
        <path d="M8 11v5"/>
        <path d="M8 8h.01"/>
        <path d="M12 16v-3a2 2 0 0 1 4 0v3"/>
      </svg>
    </a>
    <a href="https://medium.com/@sarva-20" target="_blank" rel="noopener" title="Medium">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M13.54 12a6.8 6.8 0 01-6.77 6.82A6.8 6.8 0 010 12a6.8 6.8 0 016.77-6.82A6.8 6.8 0 0113.54 12zM20.96 12c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z"/>
      </svg>
    </a>
    <a href="mailto:{{ config.extra.email }}" title="Email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m2 7 10 7 10-7"/>
      </svg>
    </a>
  </div>

  <div class="sidebar-location">
    <div>{{ config.extra.location }}</div>
    <div class="sidebar-time" id="live-time">--:--:-- IST</div>
    <div class="sidebar-weather" id="live-weather">Loading weather...</div>
  </div>
</aside>

<main class="main">
  {% block content %}{% endblock content %}
</main>

<script>
(() => {
  // Live time display
  const timeEl = document.getElementById('live-time');
  if (timeEl) {
    const updateTime = () => {
      const now = new Date();
      // Convert to IST (UTC+5:30)
      const istTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const hours = String(istTime.getHours()).padStart(2, '0');
      const mins = String(istTime.getMinutes()).padStart(2, '0');
      const secs = String(istTime.getSeconds()).padStart(2, '0');
      timeEl.textContent = `${hours}:${mins}:${secs} IST`;
    };
    updateTime();
    setInterval(updateTime, 1000);
  }
  
  // Live weather fetch
  const weatherEl = document.getElementById('live-weather');
  if (weatherEl) {
    const hasHtmlMarkup = (text) => /<!doctype html|<html|<head|<body|<style|<script/i.test(text);
    const weatherCodeLabel = {
      0: 'Veyil semma kaayuthu',
      1: 'Konjam mega irukku',
      2: 'Vaanam decide pannala',
      3: 'Mega full-ah mooditu',
      45: 'Munnadi paaka kastam',
      48: 'Munnadi paaka kastam',
      51: 'Siru thooval da',
      53: 'Umbrella ready vechuko',
      55: 'Nalla mazhai adikkuthu',
      56: 'Kuluru mazhai varudhu',
      57: 'Kuluru mazhai balama irukku',
      61: 'Mazhai aarambichiduchu',
      63: 'Nalla mazhai varudhu',
      65: 'Semma heavy mazhai',
      66: 'Kuluru mazhai da idhu',
      67: 'Kuluru heavy mazhai da',
      71: 'Sila snow varudhu',
      73: 'Snow nalla vizhudhu',
      75: 'Snow semma heavy',
      77: 'Snow grains varudhu',
      80: 'Mazhai shower varudhu',
      81: 'Heavy shower da',
      82: 'Romba violent shower',
      85: 'Snow shower varudhu',
      86: 'Heavy snow shower da',
      95: 'Poyidunga, idiyum mazhaiyum',
      96: 'Idiyoda kallu mazhai chance',
      99: 'Severe idi-kallu mazhai'
    };

    const fetchWttr = async () => {
      const response = await fetch('https://wttr.in/Coimbatore?format=%C+%t', {
        headers: { Accept: 'text/plain' }
      });
      const text = (await response.text()).trim();
      if (!response.ok || !text || hasHtmlMarkup(text)) {
        throw new Error('Invalid wttr payload');
      }
      return text.replace(/\s+/g, ' ');
    };

    const fetchOpenMeteo = async () => {
      const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=11.0168&longitude=76.9558&current=temperature_2m,weather_code&timezone=Asia%2FKolkata');
      if (!response.ok) {
        throw new Error('Open-Meteo request failed');
      }
      const data = await response.json();
      const current = data && data.current ? data.current : null;
      if (!current || typeof current.temperature_2m !== 'number') {
        throw new Error('Open-Meteo payload missing current weather');
      }
      const label = weatherCodeLabel[current.weather_code] || 'Weather';
      const temp = `${Math.round(current.temperature_2m)}°C`;
      return `${label} ${temp}`;
    };

    Promise.resolve()
      .then(fetchOpenMeteo)
      .then((weatherText) => {
        weatherEl.textContent = weatherText;
      })
      .catch(() => {
        weatherEl.textContent = 'Weather unavailable';
      });
  }

  // Back-to-top behavior: smooth scroll and threshold-based visibility
  const backToTopLinks = Array.from(document.querySelectorAll('.back-to-top'));
  if (backToTopLinks.length) {
    const threshold = 300;
    let ticking = false;

    const updateBackToTopVisibility = () => {
      const shouldShow = window.scrollY > threshold;
      backToTopLinks.forEach((link) => {
        link.classList.toggle('is-visible', shouldShow);
      });
      ticking = false;
    };

    backToTopLinks.forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    window.addEventListener('scroll', () => {
      if (!ticking) {
        window.requestAnimationFrame(updateBackToTopVisibility);
        ticking = true;
      }
    }, { passive: true });

    updateBackToTopVisibility();
  }
})();
</script>
</body>
</html>
